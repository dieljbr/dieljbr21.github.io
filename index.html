<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEL | Cyber Edition</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/6b5b2c4f0d.js" crossorigin="anonymous"></script>

</head>

<body>

<div id="loader">

<h1>DIEL</h1>

<p id="loadingText">Inicializando sistema...</p>

<div class="bar">
<div class="progress"></div>
</div>

</div>

<canvas id="matrix"></canvas>

<div id="particles"></div>

<main>

<div class="glass">

<h1 class="logo">DIEL</h1>

<p class="subtitle">
Cyber Edition
</p>

<div class="buttons">

<a class="btn discord"
href="https://discord.gg/B2HMpM8mX"
target="_blank">

💬 Discord

</a>

<a class="btn insta"
href="https://instagram.com/dieljbr"
target="_blank">

📷 Instagram

</a>

<button class="btn copy" id="copy">

📋 Copiar convite Discord

</button>

</div>

<div class="spotify">

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/1b1KmtqgB4gPhrouObJh64"
width="100%"
height="152"
frameborder="0"
allowfullscreen=""
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>

</div>

<div class="counter">

<h2>

🤣 Cornos que visitaram meu site

</h2>

<span id="visitCount">

Carregando...

</span>

</div>

<div class="lang">

<button id="pt">🇧🇷 PT</button>

<button id="en">🇺🇸 EN</button>

</div>

</div>

</main>

<footer>

© 2026 DIEL - Cyber Edition

</footer>

<script src="matrix.js"></script>

<script src="translate.js"></script>

<script src="script.js"></script>

</body>
</html>
